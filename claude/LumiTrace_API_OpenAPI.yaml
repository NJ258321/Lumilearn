openapi: 3.0.3
info:
  title: LumiTrace AI API
  description: 溯光智习 - 基于多模态的AI备考与复习智能助手
  version: 1.3.0
  contact:
    name: LumiTrace AI Team

servers:
  - url: http://localhost:3000
    description: 本地开发服务器

tags:
  - name: 课程
    description: 课程管理相关接口
  - name: 章节
    description: 章节管理相关接口
  - name: 知识点
    description: 知识点管理相关接口
  - name: 学习记录
    description: 学习记录管理相关接口
  - name: 时间标记
    description: 时间标记管理相关接口
  - name: 文件上传
    description: 文件上传相关接口

paths:
  /api/courses:
    get:
      tags: [课程]
      summary: 获取课程列表
      description: 获取所有课程，支持按状态筛选
      parameters:
        - name: status
          in: query
          description: 按状态筛选
          required: false
          schema:
            type: string
            enum: [STUDYING, REVIEWING, ARCHIVED]
      responses:
        '200':
          description: 成功返回课程列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Course'

    post:
      tags: [课程]
      summary: 创建课程
      description: 创建一个新课程
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: 课程创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Course'
        '400':
          description: 请求参数验证失败

  /api/courses/{id}:
    get:
      tags: [课程]
      summary: 获取课程详情
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: 成功返回课程详情
        '404':
          description: 课程不存在

    put:
      tags: [课程]
      summary: 更新课程
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseRequest'
      responses:
        '200':
          description: 更新成功
        '404':
          description: 课程不存在

    delete:
      tags: [课程]
      summary: 删除课程
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: 删除成功
        '404':
          description: 课程不存在

  /api/chapters:
    get:
      tags: [章节]
      summary: 获取章节列表
      parameters:
        - name: courseId
          in: query
          description: 按课程ID筛选
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功返回章节列表

    post:
      tags: [章节]
      summary: 创建章节
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChapterRequest'
            examples:
              正常示例:
                value:
                  courseId: "123e4567-e89b-12d3-a456-426614174000"
                  name: "第一章：绪论"
                  order: 1
      responses:
        '201':
          description: 章节创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Chapter'

  /api/chapters/{id}:
    get:
      tags: [章节]
      summary: 获取章节详情
      parameters:
        - $ref: '#/components/parameters/ChapterId'
      responses:
        '200':
          description: 成功返回章节详情

    put:
      tags: [章节]
      summary: 更新章节
      parameters:
        - $ref: '#/components/parameters/ChapterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChapterRequest'
      responses:
        '200':
          description: 更新成功

    delete:
      tags: [章节]
      summary: 删除章节
      parameters:
        - $ref: '#/components/parameters/ChapterId'
      responses:
        '200':
          description: 删除成功

  /api/knowledge-points:
    get:
      tags: [知识点]
      summary: 获取知识点列表
      parameters:
        - name: chapterId
          in: query
          description: 按章节ID筛选
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: 按状态筛选
          required: false
          schema:
            type: string
            enum: [MASTERED, WEAK, NEED_REVIEW, TODAY_REVIEW]
      responses:
        '200':
          description: 成功返回知识点列表

    post:
      tags: [知识点]
      summary: 创建知识点
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKnowledgePointRequest'
            examples:
              正常示例:
                value:
                  chapterId: "123e4567-e89b-12d3-a456-426614174000"
                  name: "极限的定义"
                  importance: 8
                  masteryScore: 0
      responses:
        '201':
          description: 知识点创建成功

  /api/knowledge-points/weak:
    get:
      tags: [知识点]
      summary: 获取薄弱点列表
      description: 获取掌握度小于60的知识点
      responses:
        '200':
          description: 成功返回薄弱点列表

  /api/knowledge-points/{id}:
    get:
      tags: [知识点]
      summary: 获取知识点详情
      parameters:
        - $ref: '#/components/parameters/KnowledgePointId'
      responses:
        '200':
          description: 成功返回知识点详情

    put:
      tags: [知识点]
      summary: 更新知识点
      parameters:
        - $ref: '#/components/parameters/KnowledgePointId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKnowledgePointRequest'
      responses:
        '200':
          description: 更新成功

    patch:
      tags: [知识点]
      summary: 更新知识点掌握度
      parameters:
        - $ref: '#/components/parameters/KnowledgePointId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [masteryScore]
              properties:
                masteryScore:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: 掌握度 0-100
      responses:
        '200':
          description: 更新成功

    delete:
      tags: [知识点]
      summary: 删除知识点
      parameters:
        - $ref: '#/components/parameters/KnowledgePointId'
      responses:
        '200':
          description: 删除成功

  /api/study-records:
    get:
      tags: [学习记录]
      summary: 获取学习记录列表
      parameters:
        - name: courseId
          in: query
          description: 按课程ID筛选
          schema:
            type: string
        - name: chapterId
          in: query
          description: 按章节ID筛选
          schema:
            type: string
        - name: status
          in: query
          description: 按状态筛选
          schema:
            type: string
            enum: [RECORDING, PROCESSING, COMPLETED, FAILED]
        - name: startDate
          in: query
          description: 开始日期 (ISO8601)
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: 结束日期 (ISO8601)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功返回学习记录列表

    post:
      tags: [学习记录]
      summary: 创建学习记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudyRecordRequest'
            examples:
              正常示例:
                value:
                  courseId: "123e4567-e89b-12d3-a456-426614174000"
                  chapterId: "123e4567-e89b-12d3-a456-426614174001"
                  title: "第一次学习记录"
                  date: "2026-03-03T10:00:00.000Z"
                  audioUrl: "/uploads/audio-001.mp3"
                  duration: 3600
                  status: "COMPLETED"
                  notes: "今天学习了极限的定义"
      responses:
        '201':
          description: 学习记录创建成功

  /api/study-records/{id}:
    get:
      tags: [学习记录]
      summary: 获取学习记录详情
      parameters:
        - $ref: '#/components/parameters/StudyRecordId'
      responses:
        '200':
          description: 成功返回学习记录详情

    put:
      tags: [学习记录]
      summary: 更新学习记录
      parameters:
        - $ref: '#/components/parameters/StudyRecordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudyRecordRequest'
      responses:
        '200':
          description: 更新成功

    delete:
      tags: [学习记录]
      summary: 删除学习记录
      parameters:
        - $ref: '#/components/parameters/StudyRecordId'
      responses:
        '200':
          description: 删除成功

  /api/study-records/{id}/time-marks:
    get:
      tags: [时间标记]
      summary: 获取所有时间标记
      parameters:
        - $ref: '#/components/parameters/StudyRecordId'
      responses:
        '200':
          description: 成功返回时间标记列表

    post:
      tags: [时间标记]
      summary: 添加时间标记
      parameters:
        - $ref: '#/components/parameters/StudyRecordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeMarkRequest'
            examples:
              开始标记:
                value:
                  type: START
                  timestamp: 0
              重点标记:
                value:
                  type: EMPHASIS
                  timestamp: 120000
                  content: "这是重点：epsilon-delta定义"
                  knowledgePointId: "123e4567-e89b-12d3-a456-426614174002"
              笔记标记:
                value:
                  type: NOTE
                  timestamp: 180000
                  content: "需要多练习习题"
              板书翻页:
                value:
                  type: BOARD_CHANGE
                  timestamp: 240000
                  pptPage: 5
      responses:
        '201':
          description: 时间标记创建成功

  /api/study-records/{id}/emphasis:
    post:
      tags: [时间标记]
      summary: 快速标记重点
      description: 快速创建一个EMPHASIS类型的时间标记
      parameters:
        - $ref: '#/components/parameters/StudyRecordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timestamp]
              properties:
                timestamp:
                  type: integer
                  minimum: 0
                  description: 时间戳（毫秒）
                content:
                  type: string
                  description: 标记内容
                pptPage:
                  type: integer
                  minimum: 0
                  description: PPT页码
                imageUrl:
                  type: string
                  description: 图片URL
                knowledgePointId:
                  type: string
                  format: uuid
                  description: 关联的知识点ID
      responses:
        '201':
          description: 重点标记创建成功

  /api/time-marks/{id}:
    put:
      tags: [时间标记]
      summary: 更新时间标记
      parameters:
        - $ref: '#/components/parameters/TimeMarkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTimeMarkRequest'
      responses:
        '200':
          description: 更新成功

    delete:
      tags: [时间标记]
      summary: 删除时间标记
      parameters:
        - $ref: '#/components/parameters/TimeMarkId'
      responses:
        '200':
          description: 删除成功

  /api/upload/audio:
    post:
      tags: [文件上传]
      summary: 上传音频文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 音频文件 (mp3, wav, m4a)
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                      filename:
                        type: string

  /api/upload/image:
    post:
      tags: [文件上传]
      summary: 上传图片文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 图片文件 (jpg, png, webp)
      responses:
        '200':
          description: 上传成功

  /api/upload/document:
    post:
      tags: [文件上传]
      summary: 上传文档文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 文档文件 (pdf, docx, pptx)
      responses:
        '200':
          description: 上传成功

components:
  schemas:
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [STUDYING, REVIEWING, ARCHIVED]
        type:
          type: string
          enum: [PROFESSIONAL, CROSS_MAJOR, ELECTIVE]
        examDate:
          type: string
          format: date-time
        reviewStartDate:
          type: string
          format: date-time
        targetGrade:
          type: string
          enum: [S, A, B, C]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCourseRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: 课程名称
        status:
          type: string
          enum: [STUDYING, REVIEWING, ARCHIVED]
          default: STUDYING
        type:
          type: string
          enum: [PROFESSIONAL, CROSS_MAJOR, ELECTIVE]
          default: PROFESSIONAL
        examDate:
          type: string
          format: date-time
          description: 考试日期
        reviewStartDate:
          type: string
          format: date-time
          description: 复习开始日期
        targetGrade:
          type: string
          enum: [S, A, B, C]
          description: 目标成绩

    UpdateCourseRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [STUDYING, REVIEWING, ARCHIVED]
        type:
          type: string
          enum: [PROFESSIONAL, CROSS_MAJOR, ELECTIVE]
        examDate:
          type: string
          format: date-time
        reviewStartDate:
          type: string
          format: date-time
        targetGrade:
          type: string
          enum: [S, A, B, C]

    Chapter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        name:
          type: string
        order:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateChapterRequest:
      type: object
      required: [courseId, name, order]
      properties:
        courseId:
          type: string
          format: uuid
          description: 课程ID
        name:
          type: string
          description: 章节名称
        order:
          type: integer
          minimum: 1
          description: 排序序号（同一课程下必须唯一）

    UpdateChapterRequest:
      type: object
      properties:
        name:
          type: string
        order:
          type: integer
          minimum: 1

    KnowledgePoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chapterId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [MASTERED, WEAK, NEED_REVIEW, TODAY_REVIEW]
        importance:
          type: integer
          minimum: 1
          maximum: 10
        masteryScore:
          type: integer
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateKnowledgePointRequest:
      type: object
      required: [chapterId, name, importance, masteryScore]
      properties:
        chapterId:
          type: string
          format: uuid
          description: 章节ID
        name:
          type: string
          description: 知识点名称
        importance:
          type: integer
          minimum: 1
          maximum: 10
          description: 重要性（1-10）
        masteryScore:
          type: integer
          minimum: 0
          maximum: 100
          description: 掌握度（0-100）

    UpdateKnowledgePointRequest:
      type: object
      properties:
        name:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 10
        masteryScore:
          type: integer
          minimum: 0
          maximum: 100

    StudyRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        chapterId:
          type: string
          format: uuid
        title:
          type: string
        date:
          type: string
          format: date-time
        audioUrl:
          type: string
        duration:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [RECORDING, PROCESSING, COMPLETED, FAILED]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateStudyRecordRequest:
      type: object
      required: [courseId, chapterId, title, date, audioUrl, duration]
      properties:
        courseId:
          type: string
          format: uuid
          description: 课程ID
        chapterId:
          type: string
          format: uuid
          description: 章节ID
        title:
          type: string
          description: 学习记录标题
        date:
          type: string
          format: date-time
          description: 学习日期
        audioUrl:
          type: string
          description: 音频文件URL
        duration:
          type: integer
          minimum: 0
          description: 时长（秒）
        status:
          type: string
          enum: [RECORDING, PROCESSING, COMPLETED, FAILED]
          default: RECORDING
        notes:
          type: string
          description: 学习笔记

    UpdateStudyRecordRequest:
      type: object
      properties:
        title:
          type: string
        duration:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [RECORDING, PROCESSING, COMPLETED, FAILED]
        notes:
          type: string

    TimeMark:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studyRecordId:
          type: string
          format: uuid
        knowledgePointId:
          type: string
          format: uuid
        type:
          type: string
          enum: [START, END, EMPHASIS, BOARD_CHANGE, NOTE, QUESTION]
        timestamp:
          type: integer
          minimum: 0
        pptPage:
          type: integer
          minimum: 0
        content:
          type: string
        imageUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTimeMarkRequest:
      type: object
      required: [type, timestamp]
      properties:
        type:
          type: string
          enum: [START, END, EMPHASIS, BOARD_CHANGE, NOTE, QUESTION]
          description: 标记类型
        timestamp:
          type: integer
          minimum: 0
          description: 时间戳（毫秒）
        knowledgePointId:
          type: string
          format: uuid
          description: 关联的知识点ID
        pptPage:
          type: integer
          minimum: 0
          description: PPT页码
        content:
          type: string
          description: 标记内容
        imageUrl:
          type: string
          description: 图片URL

    UpdateTimeMarkRequest:
      type: object
      properties:
        type:
          type: string
          enum: [START, END, EMPHASIS, BOARD_CHANGE, NOTE, QUESTION]
        timestamp:
          type: integer
          minimum: 0
        knowledgePointId:
          type: string
          format: uuid
        pptPage:
          type: integer
          minimum: 0
        content:
          type: string
        imageUrl:
          type: string

  parameters:
    CourseId:
      name: id
      in: path
      required: true
      description: 课程ID
      schema:
        type: string
        format: uuid

    ChapterId:
      name: id
      in: path
      required: true
      description: 章节ID
      schema:
        type: string
        format: uuid

    KnowledgePointId:
      name: id
      in: path
      required: true
      description: 知识点ID
      schema:
        type: string
        format: uuid

    StudyRecordId:
      name: id
      in: path
      required: true
      description: 学习记录ID
      schema:
        type: string
        format: uuid

    TimeMarkId:
      name: id
      in: path
      required: true
      description: 时间标记ID
      schema:
        type: string
        format: uuid
